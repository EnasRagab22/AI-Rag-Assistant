services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: tips_hindawi_backend
    restart: unless-stopped

    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
      - API_KEY=${API_KEY:-secret226}
      - DATA_DIR=/app/data

    volumes:

      - ./data:/app/data:ro
      # Persistent 
      - hf_cache:/app/.cache/huggingface

    ports:
      - "5050:8000"


    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all           
              capabilities: [gpu]
             

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 30s
      retries: 10
      start_period: 120s          

    networks:
      - app_network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: tips_hindawi_frontend
    restart: unless-stopped

    environment:
      - API_URL=http://backend:8000
      - API_KEY=${API_KEY:-secret226}

    ports:
      - "8522:8501"

    depends_on:
      backend:
        condition: service_healthy

    networks:
      - app_network
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    user: root                      
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock   
      - /usr/bin/docker:/usr/bin/docker            
    restart: unless-stopped

volumes:
  hf_cache:
    driver: local

networks:
  app_network:
    driver: bridge
